<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;background:#050816;color:white;display:flex;justify-content:center;align-items:center;height:100vh;">

<div>
  <h2>MMC Login</h2>

  <input id="email" placeholder="Email" style="display:block;margin:10px;padding:10px;width:250px;">
  <input id="password" type="password" placeholder="Password" style="display:block;margin:10px;padding:10px;width:250px;">

  <button onclick="login()" style="padding:10px 20px;margin:10px;">Login</button>

  <p id="msg"></p>
</div>

<script>
const supabaseUrl = "https://mkrnksthkovbolgvggvh.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Login error: " + error.message);
    return;
  }

  alert("Login success!");
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
